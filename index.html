<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>화이트보드</title>

<style>
html, body {
  margin:0; padding:0;
  overflow:hidden;
  background:#0b1d0b;
  font-family:sans-serif;
}

#canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
}

#drawArea {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
}

/* 툴바 */
.toolbar {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(20,40,20,0.95);
  padding:8px;
  border-radius:15px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  z-index:9999;
}

button, input {
  border:none;
  border-radius:8px;
  padding:6px;
}

button {
  background:#2e4d2e;
  color:#fff;
}

.active {
  background:#6be36b !important;
  color:#000;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="drawArea"></div>

<div class="toolbar">
  <button id="pen">✏️</button>
  <button id="rect">▭</button>
  <button id="circle">⚪</button>
  <button id="line">📏</button>
  <button id="text">🅰️</button>
  <button id="select">⬚</button>
  <button id="undo">↩</button>
  <button id="clear">🗑</button>
  <button id="save">💾</button>

  <input type="color" id="color">
  <input type="range" id="size" min="1" max="10" value="2">
  <input type="file" id="imgInput">
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const area = document.getElementById('drawArea');

let mode='pen';
let drawing=false;
let startX=0,startY=0;
let data=[], history=[], selected=null;

let color='#ffffff';
let size=2;

const btns = ['pen','rect','circle','line','text','select'];

btns.forEach(id=>{
  document.getElementById(id).onclick=()=>setMode(id);
});

function setMode(m){
  mode=m;
  btns.forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(m).classList.add('active');
}
setMode('pen');

document.getElementById('undo').onclick=undo;
document.getElementById('clear').onclick=()=>{save();data=[];draw();}
document.getElementById('save').onclick=()=>{
  const link=document.createElement('a');
  link.download='whiteboard.png';
  link.href=canvas.toDataURL();
  link.click();
};

document.getElementById('color').oninput=e=>color=e.target.value;
document.getElementById('size').oninput=e=>size=e.target.value;

/* 이미지 */
document.getElementById('imgInput').onchange=e=>{
  const file=e.target.files[0];
  const img=new Image();
  img.onload=()=>{
    save();
    data.push({t:'img',img,x:50,y:50,w:200,h:200});
    draw();
  };
  img.src=URL.createObjectURL(file);
};

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
  draw();
}
window.addEventListener('resize',resize);
resize();

function save(){history.push(JSON.stringify(data));}
function undo(){if(history.length){data=JSON.parse(history.pop());draw();}}

function pos(e){
  if(e.touches) return {x:e.touches[0].clientX,y:e.touches[0].clientY};
  return {x:e.clientX,y:e.clientY};
}

area.addEventListener('mousedown',start);
area.addEventListener('mousemove',move);
area.addEventListener('mouseup',end);

area.addEventListener('touchstart',start,{passive:false});
area.addEventListener('touchmove',move,{passive:false});
area.addEventListener('touchend',end,{passive:false});

function start(e){
  e.preventDefault();
  drawing=true;
  const p=pos(e);
  startX=p.x; startY=p.y;

  if(mode==='pen'){
    save();
    data.push({t:'pen',pts:[p],c:color,s:size});
  }

  if(mode==='text'){
    const txt=prompt('텍스트 입력');
    if(txt){
      save();
      data.push({t:'text',txt,x:p.x,y:p.y,c:color});
      draw();
    }
  }
}

function move(e){
  if(!drawing) return;
  e.preventDefault();
  const p=pos(e);

  if(mode==='pen'){
    data[data.length-1].pts.push(p);
  }

  draw();
}

function end(e){
  drawing=false;
  const p=pos(e);

  if(mode==='rect'){
    save();
    data.push({t:'rect',x:startX,y:startY,w:p.x-startX,h:p.y-startY,c:color,s:size});
  }

  if(mode==='circle'){
    save();
    data.push({t:'circle',x:startX,y:startY,r:Math.hypot(p.x-startX,p.y-startY),c:color,s:size});
  }

  if(mode==='line'){
    save();
    data.push({t:'line',x:startX,y:startY,x2:p.x,y2:p.y,c:color,s:size});
  }

  draw();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#0b1d0b';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  data.forEach(d=>{
    ctx.strokeStyle=d.c||'#fff';
    ctx.lineWidth=d.s||2;

    if(d.t==='pen'){
      ctx.beginPath();
      d.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
      ctx.stroke();
    }

    if(d.t==='rect'){
      ctx.strokeRect(d.x,d.y,d.w,d.h);
    }

    if(d.t==='circle'){
      ctx.beginPath();
      ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.stroke();
    }

    if(d.t==='line'){
      ctx.beginPath();
      ctx.moveTo(d.x,d.y);
      ctx.lineTo(d.x2,d.y2);
      ctx.stroke();
    }

    if(d.t==='text'){
      ctx.fillStyle=d.c;
      ctx.fillText(d.txt,d.x,d.y);
    }

    if(d.t==='img'){
      ctx.drawImage(d.img,d.x,d.y,d.w,d.h);
    }
  });
}
</script>

</body>
</html>
