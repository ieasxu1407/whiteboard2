<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화이트보드 안정버전</title>

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:#0b1d0b;
}

/* 그림용 캔버스 */
#canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:0;
}

/* 🔥 이벤트 전용 영역 */
#drawArea {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:1;
}

/* 버튼 */
.toolbar {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1a2e1a;
  padding:10px;
  border-radius:15px;
  display:flex;
  gap:8px;
  z-index:9999;
}

button {
  background:#2e4d2e;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="drawArea"></div>

<div class="toolbar">
  <button onclick="setMode('pen')">펜</button>
  <button onclick="setMode('rect')">사각형</button>
  <button onclick="setMode('circle')">원</button>
  <button onclick="setMode('select')">선택</button>
  <button onclick="undo()">실행취소</button>
  <button onclick="clearBoard()">전체삭제</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const area = document.getElementById('drawArea');

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  draw();
}
window.addEventListener('resize', resize);
resize();

let mode='pen';
let drawing=false;
let startX=0,startY=0;
let data=[];
let history=[];
let selected=null;

function setMode(m){ mode=m; }

function save(){
  history.push(JSON.stringify(data));
}

function undo(){
  if(history.length){
    data = JSON.parse(history.pop());
    draw();
  }
}

function clearBoard(){
  save();
  data=[];
  draw();
}

function pos(e){
  if(e.touches) return {
    x:e.touches[0].clientX,
    y:e.touches[0].clientY
  };
  return {x:e.clientX,y:e.clientY};
}

/* 🔥 drawArea만 이벤트 받음 */
area.addEventListener('mousedown',start);
area.addEventListener('mousemove',move);
area.addEventListener('mouseup',end);

area.addEventListener('touchstart',start,{passive:false});
area.addEventListener('touchmove',move,{passive:false});
area.addEventListener('touchend',end,{passive:false});

function start(e){
  e.preventDefault();
  drawing=true;

  const p=pos(e);
  startX=p.x;
  startY=p.y;

  if(mode==='pen'){
    save();
    data.push({t:'pen',pts:[p]});
  }

  if(mode==='select'){
    selected=data.find(d =>
      d.x && p.x>d.x && p.x<d.x+d.w &&
      p.y>d.y && p.y<d.y+d.h
    );
  }
}

function move(e){
  if(!drawing) return;
  e.preventDefault();

  const p=pos(e);

  if(mode==='pen'){
    data[data.length-1].pts.push(p);
  }

  if(mode==='select' && selected){
    selected.x += p.x-startX;
    selected.y += p.y-startY;
    startX=p.x;
    startY=p.y;
  }

  draw();
}

function end(e){
  drawing=false;
  const p=pos(e);

  if(mode==='rect'){
    save();
    data.push({t:'rect',x:startX,y:startY,w:p.x-startX,h:p.y-startY});
  }

  if(mode==='circle'){
    save();
    data.push({t:'circle',x:startX,y:startY,r:Math.hypot(p.x-startX,p.y-startY)});
  }

  selected=null;
  draw();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* 칠판 배경 */
  ctx.fillStyle='#0b1d0b';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle='rgba(255,255,255,0.05)';
  for(let i=0;i<canvas.height;i+=40){
    ctx.beginPath();
    ctx.moveTo(0,i);
    ctx.lineTo(canvas.width,i);
    ctx.stroke();
  }

  data.forEach(d=>{
    ctx.strokeStyle='#fff';
    ctx.lineWidth=2;

    if(d.t==='pen'){
      ctx.beginPath();
      d.pts.forEach((p,i)=>{
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
      });
      ctx.stroke();
    }

    if(d.t==='rect'){
      ctx.strokeRect(d.x,d.y,d.w,d.h);
    }

    if(d.t==='circle'){
      ctx.beginPath();
      ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.stroke();
    }
  });
}
</script>

</body>
</html>
